{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Admin Dashboard</h2>

<div class="row">
    <div class="col-md-4">
        <div class="card text-white bg-primary mb-3 shadow">
            <div class="card-body">
                <h5>Total Books</h5>
                <h2>120</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-white bg-success mb-3 shadow">
            <div class="card-body">
                <h5>Issued Books</h5>
                <h2>45</h2>
            </div>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card text-white bg-danger mb-3 shadow">
            <div class="card-body">
                <h5>Overdue Books</h5>
                <h2>10</h2>
            </div>
        </div>
    </div>
</div>

            </thead>
            <tbody>
                <tr>

            </tbody>
        </table>

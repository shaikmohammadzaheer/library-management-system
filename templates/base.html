<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">📘 Library System</a>

        <div class="d-flex gap-2">

    <a href="/" class="btn {% if request.path == '/' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">
        Home
    </a>

    <a href="/admin" class="btn {% if request.path == '/admin' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">
        Admin
    </a>

    <a href="/books" class="btn {% if request.path == '/books' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">
        Books
    </a>

    <a href="/student" class="btn {% if request.path == '/student' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">
        Student
    </a>

    <a href="/issued" class="btn {% if request.path == '/issued' %}btn-light text-dark{% else %}btn-outline-light{% endif %}">
        Issued
    </a>

</div>
    </div>
</nav>

<!-- Main Content -->
<div class="container mt-5">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>

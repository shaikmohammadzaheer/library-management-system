{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Book Management</h2>

<!-- Search + Add -->
<div class="mb-3">
    <form method="POST" action="/add_book" class="d-flex gap-2">
        <input type="text" name="title" placeholder="Title" required class="form-control">
        <input type="text" name="author" placeholder="Author" required class="form-control">
        <input type="number" name="quantity" placeholder="Qty" required class="form-control">

        <button type="submit" class="btn btn-primary">+ Add Book</button>
    </form>
</div>
<!-- Table -->
<div class="card shadow">
    <div class="card-body">

        <table class="table table-hover table-bordered">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Author</th>
                    <th>Available</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
{% for book in books %}
<tr>
  <td>{{ book.title }}</td>
  <td>{{ book.author }}</td>
  <td>{{ book.quantity }}</td>
  <td>
    <a href="/edit/{{ book.id }}" class="btn btn-sm btn-warning me-1">Edit</a>
    
    <a href="/delete/{{ book.id }}" class="btn btn-sm btn-danger me-1">Delete</a>
    {% if book.quantity > 0 %}
<a href="/issue/{{ book.id }}" class="btn btn-success btn-sm">Issue</a>
{% else %}
<button class="btn btn-secondary btn-sm" disabled>Out of Stock</button>
{% endif %}
<a href="/return/{{ book.id }}" class="btn btn-info btn-sm">Return</a>
</td>
</tr>
{% endfor %}
</tbody>
        </table>
    </div>
</div>
{% endblock %}

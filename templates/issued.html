<h2>Issued Books</h2>

<div class="card shadow p-3 mt-3">
   <table border="1">
    <tr>
        <th>Student</th>
        <th>Book</th>
        <th>Action</th>
    </tr>

    {% for item in issued %}
    <tr>
        <td>{{ item.student.name }}</td>
        <td>{{ item.book.title }}</td>
        <td>
            <a href="/return/{{ item.id }}">Return</a>
        </td>
    </tr>
    {% endfor %}
</table>

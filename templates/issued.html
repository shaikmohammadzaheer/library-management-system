{% extends "base.html" %}

{% block content %}
<h2>Issued Books</h2>

<table class="table table-bordered">
    <tr>
        <th>Student</th>
        <th>Book</th>
        <th>Action</th>
    </tr>

    {% for item in records %}
    <tr>
        <td>{{ item.student }}</td>
        <td>{{ item.book }}</td>
        <td>
            <a href="/return/{{ item.id }}" class="btn btn-success btn-sm">Return</a>
        </td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
